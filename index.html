<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiD Search — Updated</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
    <script src="data.js"></script>

    <style>
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Google Sans', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; /* سینٹر کرنے کے لیے */
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 600px;
            text-align: center;
            padding-top: 50px;
        }

        .logo { font-size: 32px; font-weight: bold; margin-bottom: 30px; }
        .logo span { color: #4285F4; }

        /* سرچ بار کو سینٹر میں لانے کے لیے */
        .search-box {
            position: relative;
            width: 90%;
            margin: 0 auto;
        }

        #search-input {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid #dfe1e5;
            font-size: 16px;
            outline: none;
            box-shadow: none;
            transition: 0.3s;
        }

        #search-input:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }

        /* ٹیبز کا ڈیزائن */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid #dadce0;
            background: white;
            cursor: pointer;
            font-size: 14px;
        }

        .tab-btn.active {
            background: #e8f0fe;
            color: #1967d2;
            border-color: #1967d2;
        }

        #results {
            width: 90%;
            max-width: 600px;
            margin-top: 30px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><span>DigiD</span> Search</div>
        
        <form id="search-form" onsubmit="return false;">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="یہاں سرچ کریں...">
            </div>
        </form>

        <div class="tabs">
            <button class="tab-btn active" onclick="filterData('all', this)">All</button>
            <button class="tab-btn" onclick="filterData('project', this)">Projects</button>
            <button class="tab-btn" onclick="filterData('nexus', this)">Nexus</button>
        </div>
    </header>

    <main id="results"></main>

    <script src="script.js"></script>
</body>
</html>
